<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Second Brain Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="status-bar" class="status-bar"></div>

  <div class="header">
    <h2>🧠 Save to Brain</h2>
  </div>

  <div id="error-msg" class="error-msg hidden"></div>

  <form id="capture-form">
    <div class="field">
      <label for="sb-title">Title</label>
      <input id="sb-title" type="text" required placeholder="Note title">
    </div>

    <div class="field">
      <label for="sb-type">Type</label>
      <select id="sb-type">
        <option value="note">Note</option>
        <option value="meeting">Meeting</option>
        <option value="link">Link</option>
        <option value="idea">Idea</option>
        <option value="people">Person</option>
        <option value="projects">Project</option>
        <option value="strategy">Strategy</option>
        <option value="personal">Personal</option>
      </select>
    </div>

    <div class="field">
      <label for="sb-body">Body</label>
      <textarea id="sb-body" rows="8" placeholder="Content will be extracted here…"></textarea>
    </div>

    <div class="field">
      <label for="sb-tags">Tags</label>
      <input id="sb-tags" type="text" placeholder="comma-separated tags">
    </div>

    <div class="button-row">
      <button type="submit" id="save-btn">Save</button>
      <button type="button" id="cancel-btn">Cancel</button>
    </div>
  </form>

  <div id="history-section" class="hidden">
    <h3>Recent Captures</h3>
    <ul id="history-list"></ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
