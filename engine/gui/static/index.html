<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Brain</title>
  <link rel="stylesheet" href="/ui/style.css">
  <link rel="stylesheet" href="/ui/vendor/easymde.min.css">
</head>
<body>
  <header id="topbar">
    <input id="search-input" type="text" placeholder="Search notes (keyword or semantic)..." autocomplete="off">
    <select id="search-mode">
      <option value="keyword">Keyword</option>
      <option value="semantic">Semantic</option>
    </select>
    <button id="new-note-btn">+ New Note</button>
    <button id="upload-btn" title="View all uploaded files">+ File</button>
    <button id="batch-capture-btn" title="Capture all unindexed notes">Batch Capture</button>
    <span id="sse-status" class="sse-dot sse-disconnected" title="Live refresh"></span>
  </header>
  <div id="layout">
    <aside id="sidebar">
      <div id="sidebar-loading">Loading...</div>
      <div id="filter-banner" style="display:none" class="filter-banner"></div>
      <ul id="note-list"></ul>
    </aside>
    <main id="center">
      <div id="viewer-toolbar">
        <button id="edit-btn">Edit</button>
        <button id="open-editor-btn">Open in Editor</button>
        <button id="save-btn" style="display:none">Save (Ctrl+S)</button>
        <span id="save-error" style="color:red;display:none"></span>
        <button id="delete-btn">Delete</button>
        <button id="viewer-upload-btn" title="Attach file to this note" style="display:none">+ File</button>
      </div>
      <div id="tag-chips" class="tag-chips-row"></div>
      <div id="viewer"></div>
      <div id="attachments-section" style="display:none; padding: 12px 16px; border-top: 1px solid #e0e0e0;">
        <h4 style="margin: 0 0 8px 0; font-size: 13px; color: #666;">Attachments</h4>
        <ul id="attachments-list" style="list-style:none; margin:0; padding:0;"></ul>
      </div>
      <textarea id="editor-area" style="display:none"></textarea>
    </main>
    <aside id="right-panel">
      <section id="meta-panel">
        <h3>Backlinks</h3>
        <ul id="backlinks-list"></ul>
        <h3>Related</h3>
        <ul id="related-list"></ul>
      </section>
      <section id="actions-panel">
        <h3>Action Items</h3>
        <ul id="actions-list"></ul>
      </section>
      <section id="intelligence-panel">
        <h3>Intelligence</h3>
        <div id="recap-content"></div>
        <ul id="nudges-list"></ul>
      </section>
    </aside>
  </div>
  <div id="new-note-modal" style="display:none">
    <div id="modal-content">
      <h2>New Note</h2>
      <label>Title: <input id="modal-title" type="text"></label>
      <label>Type:
        <select id="modal-type">
          <option>idea</option><option>meeting</option><option>person</option>
          <option>project</option><option>work</option>
        </select>
      </label>
      <label>Body:<br><textarea id="modal-body" rows="6"></textarea></label>
      <button id="modal-save">Create</button>
      <button id="modal-cancel">Cancel</button>
    </div>
  </div>
  <div id="delete-note-modal" style="display:none">
    <div id="delete-modal-content">
      <h2>Delete Note</h2>
      <p id="delete-modal-filename" style="font-weight:bold"></p>
      <p>This will permanently delete the note and all its index entries.</p>
      <span id="delete-modal-error" style="color:red;display:none"></span>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button id="delete-modal-cancel">Cancel</button>
        <button id="delete-modal-confirm">Delete</button>
      </div>
    </div>
  </div>
  <input type="file" id="file-input" style="display:none"
    accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.jpg,.jpeg,.png,.gif,.webp,.bmp,.tiff">
  <div id="files-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:8px; padding:24px; min-width:480px; max-width:700px; max-height:70vh; display:flex; flex-direction:column; gap:12px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0; font-size:16px;">All Uploaded Files</h2>
        <button id="files-modal-close" style="background:none; border:none; font-size:18px; cursor:pointer;">×</button>
      </div>
      <ul id="files-modal-list" style="list-style:none; margin:0; padding:0; overflow-y:auto; flex:1; font-size:13px;"></ul>
    </div>
  </div>
  <script src="/ui/vendor/marked.min.js"></script>
  <script src="/ui/vendor/easymde.min.js"></script>
  <script type="module" src="/ui/app.js"></script>
</body>
</html>
