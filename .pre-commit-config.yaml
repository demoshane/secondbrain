repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: .env.host.example

  - repo: local
    hooks:
      - id: semgrep
        name: semgrep security scan (non-blocking)
        language: system
        entry: bash -c 'semgrep scan --config p/python --config p/security-audit --quiet --no-autofix "$@" || true'
        types: [python]
        files: ^engine/
        verbose: true
